<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="plugGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8F4FD;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Inner circle for depth -->
  <circle cx="256" cy="256" r="200" fill="#357ABD" opacity="0.3"/>
  
  <!-- Plugin icon - stylized plug/connection -->
  <g transform="translate(256, 256)">
    <!-- Main plug body -->
    <rect x="-60" y="-100" width="120" height="160" rx="12" fill="url(#plugGradient)" filter="url(#shadow)"/>
    
    <!-- Plug prongs -->
    <rect x="-40" y="-120" width="24" height="40" rx="4" fill="url(#plugGradient)"/>
    <rect x="16" y="-120" width="24" height="40" rx="4" fill="url(#plugGradient)"/>
    
    <!-- Connection dots -->
    <circle cx="-30" cy="-20" r="8" fill="#4A90D9"/>
    <circle cx="30" cy="-20" r="8" fill="#4A90D9"/>
    <circle cx="-30" cy="30" r="8" fill="#4A90D9"/>
    <circle cx="30" cy="30" r="8" fill="#4A90D9"/>
    
    <!-- Center connection line -->
    <rect x="-4" y="-60" width="8" height="120" rx="4" fill="#4A90D9"/>
    
    <!-- Plug cable -->
    <path d="M 0 60 Q 0 100 40 100 L 60 100" stroke="url(#plugGradient)" stroke-width="16" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="120" cy="120" r="20" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="392" cy="120" r="15" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="120" cy="392" r="15" fill="#FFFFFF" opacity="0.2"/>
  <circle cx="392" cy="392" r="20" fill="#FFFFFF" opacity="0.2"/>
  
  <!-- Small plugin indicators -->
  <rect x="80" y="240" width="40" height="40" rx="8" fill="#FFFFFF" opacity="0.3"/>
  <rect x="392" y="240" width="40" height="40" rx="8" fill="#FFFFFF" opacity="0.3"/>
</svg>

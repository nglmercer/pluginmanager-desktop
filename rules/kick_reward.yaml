# @import data from './RewardRedeemed.json'
# Chat comment rule - TTS processing with quality filtering
# Quality filter configuration is in plugins/ai/constants.ts
- id: RewardRedeemed-id
  on: RewardRedeemed
  if:
    - field: ${data.reward_title}
      operator: EQ
      value: "xd_f"
      
  do:
    mode: EITHER
    actions:
      - type: overlay-service
        params:
          method: POST
            #"{eventName: 'kick_reward_redeemed', data: {username: '${data.sender.username}',message: '${data.content}'},target: {id: '5de9c752-98b7-4bea-aea4-44b8c4b893ba'}}"
      - type: overlay-service
        params:
          method: POST

- id: RewardRedeemed-id-2
  on: RewardRedeemed
  if:
    - field: ${data.reward_title}
      operator: EQ
      value: "ooooh_cat"

  do:
    mode: SEQUENCE
    actions:
      - type: OVERLAY_WEBHOOK
        params:
          method: POST
          body:
            type: "alert"
            eventName: "kick_reward_redeemed"
            data:
              {
                username: "${data.username}",
                reward_title: "${data.reward_title}",
                message: "${data.user_input}",
              }
            target: { id: "9dd05223-4379-45b1-80ee-6c5754c1c224" }
